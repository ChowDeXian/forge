<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover" />
    <title>%WEB_TITLE%</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0D0D0D" />
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />

    <!-- iOS install-to-home-screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FORGE" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />

    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* Unlocked: the page flows naturally so Safari's toolbar can collapse
         and the browser fills the visible height itself (no bottom black bar). */
      html,
      body {
        height: 100%;
      }
      body {
        overflow: hidden;
        background-color: #0d0d0d;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-text-size-adjust: 100%;
      }
      input, textarea {
        -webkit-user-select: text;
        user-select: text;
      }
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
  </head>

  <body>
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('sw.js').catch(function () { /* dev server has no sw.js */ });
        });
        // when an update activates, reload once so the new version applies on this launch
        var hadController = !!navigator.serviceWorker.controller;
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          if (hadController) location.reload();
          hadController = true;
        });
      }
    </script>
  </body>
</html>
