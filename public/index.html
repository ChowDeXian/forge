<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, shrink-to-fit=no, viewport-fit=cover" />
    <title>%WEB_TITLE%</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0D0D0D" />
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />

    <!-- iOS install-to-home-screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FORGE" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />

    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* Lock the page to the screen: fixed body kills iOS rubber-band panning
         and zoom drift; the app scrolls in its own ScrollViews. */
      html,
      body {
        height: 100%;
      }
      body {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        width: 100%;
        overflow: hidden;
        background-color: #0d0d0d;
        overscroll-behavior: none;
        touch-action: manipulation;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-text-size-adjust: 100%;
      }
      input, textarea {
        -webkit-user-select: text;
        user-select: text;
      }
      /* Root fills the whole screen edge-to-edge; safe-area insets are
         applied per-surface inside the app (react-native-safe-area-context). */
      /* NOTE: no dvh here — iOS standalone PWAs under-report dynamic viewport
         units (excludes safe areas), which shows up as a dead bar at the bottom.
         The fixed-position body already spans the exact visual viewport. */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
  </head>

  <body>
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('sw.js').catch(function () { /* dev server has no sw.js */ });
        });
      }
    </script>
  </body>
</html>
