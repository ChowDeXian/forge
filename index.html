    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* Lock the page to the screen: fixed body kills iOS rubber-band panning
         and zoom drift; the app scrolls in its own ScrollViews. */
      html,
      body {
        height: 100%;
      }
      body {
        position: fixed;
        top: 0; left: 0;
        width: 100%;
        height: 100%; /* corrected to the live window height by the fit() script below */
        overflow: hidden;
        background-color: #0d0d0d;
        overscroll-behavior: none;
        touch-action: manipulation;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-text-size-adjust: 100%;
      }
      input, textarea {
        -webkit-user-select: text;
        user-select: text;
      }
      /* Root fills the whole screen edge-to-edge; safe-area insets are
         applied per-surface inside the app (react-native-safe-area-context). */
      /* NOTE: no dvh here — iOS standalone PWAs under-report dynamic viewport
         units (excludes safe areas), which shows up as a dead bar at the bottom.
         The fixed-position body already spans the exact visual viewport. */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
  <meta name="theme-color" content="#0D0D0D">
</head>

  <body>
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>
    <script>
      // iOS never resolves CSS 100%/vh/dvh to the real visible height in all modes
      // (Safari's collapsing toolbar, standalone safe areas). Measure it instead.
      (function () {
        function fit() { document.body.style.height = window.innerHeight + 'px'; }
        window.addEventListener('resize', fit);
        window.addEventListener('orientationchange', fit);
        fit();
      })();
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('sw.js').catch(function () { /* dev server has no sw.js */ });
        });
        // when an update activates, reload once so the new version applies on this launch
        var hadController = !!navigator.serviceWorker.controller;
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          if (hadController) location.reload();
          hadController = true;
        });
      }
    </script>
